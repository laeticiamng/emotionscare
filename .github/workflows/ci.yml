name: CI

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      node: ${{ steps.versions.outputs.node }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - id: versions
        run: echo "node=20" >> "$GITHUB_OUTPUT"

  sentry-guard:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure web Sentry client does not use Next.js SDK or env vars
        run: |
          if grep -rl '@sentry/nextjs' src/lib/obs 2>/dev/null; then
            echo "Do not use @sentry/nextjs in web Sentry code." >&2
            exit 1
          fi
          if grep -rl 'process\.env\.NEXT_' src/lib/obs 2>/dev/null; then
            echo "Do not use process.env.NEXT_* in web Sentry code." >&2
            exit 1
          fi

  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.setup.outputs.node }}
          cache: 'npm'
      - run: npm ci
      - run: npm run check:env
      - run: npm run lint
      - run: npm run lint:imports

  typecheck:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.setup.outputs.node }}
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.setup.outputs.node }}
          cache: 'npm'
      - run: npm ci
      - name: Run unit tests with coverage
        run: npm test -- --coverage
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          retention-days: 7

  build:
    needs: [lint, sentry-guard, typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.setup.outputs.node }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  e2e:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.setup.outputs.node }}
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Start preview server
        run: |
          npx vite preview --host 0.0.0.0 --port 4173 > preview.log 2>&1 &
          echo $! > preview.pid
      - name: Wait for preview server
        run: |
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:4173 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Preview server failed to start" >&2
          exit 1
      - name: Run Playwright tests
        env:
          PW_BASE_URL: http://127.0.0.1:4173
        run: npm run e2e
      - name: Stop preview server
        if: always()
        run: |
          if [ -f preview.pid ]; then
            kill $(cat preview.pid) || true
          fi
      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            playwright-report
            test-results
            preview.log
          retention-days: 7

  lhci:
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.setup.outputs.node }}
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Start preview server
        run: |
          npx vite preview --host 0.0.0.0 --port 4173 > preview.log 2>&1 &
          echo $! > preview.pid
      - name: Wait for preview server
        run: |
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:4173 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Preview server failed to start" >&2
          exit 1
      - name: Run Lighthouse CI
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          LHCI_TOKEN: ${{ secrets.LHCI_TOKEN }}
          PREVIEW_URL: http://127.0.0.1:4173
        run: npm run lhci
      - name: Stop preview server
        if: always()
        run: |
          if [ -f preview.pid ]; then
            kill $(cat preview.pid) || true
          fi
      - name: Upload Lighthouse artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: |
            .lighthouseci
            preview.log
          retention-days: 7
      - run: npm run scan:no-clinical-terms
      - run: npm run scan:no-raw-numbers

  e2e-smoke:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.setup.outputs.node }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Start preview server
        run: |
          npx vite preview --port 4173 --host 0.0.0.0 &
          npx wait-on http://127.0.0.1:4173
      - name: Run smoke Playwright tests
        env:
          PW_BASE_URL: http://127.0.0.1:4173
        run: npx playwright test --config=playwright.smoke.config.ts
