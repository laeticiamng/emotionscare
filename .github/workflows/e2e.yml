name: E2E

on:
  pull_request:

env:
  NODE_ENV: test

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Build
        run: npm run build

      - name: Start preview server
        run: |
          npx vite preview --host 0.0.0.0 --port 4173 > preview.log 2>&1 &
          echo $! > preview.pid

      - name: Wait for preview server
        run: |
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:4173 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Preview server failed to start" >&2
          cat preview.log
          exit 1

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run E2E
        run: npm run e2e
        env:
          PW_BASE_URL: http://127.0.0.1:4173

      - name: Stop preview server
        if: always()
        run: |
          if [ -f preview.pid ]; then
            kill $(cat preview.pid) || true
          fi

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
            preview.log
